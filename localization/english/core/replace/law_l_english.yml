l_english:
 law_clan_mother:0 "Clan Mother"
 law_clan_mother_desc:0 "The Clan Mother holds much weight in the Haudenosaunee.  The Clan Mother is a leader not only of her clan, but of the nation as well.  The Clan Mother selects their spokesman (Hoyane or Chief) to represent them in council.  If their Hoyane doesn’t represent their clan, the Clan Mother has the authority to remove their leader as well after warnings.  The Hoyane and the Clan Mother work together to best represent the people of her clan."