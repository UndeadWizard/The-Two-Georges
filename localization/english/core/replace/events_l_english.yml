l_english:
 great_cajun_rebellion.1.t:0 "The Great Cajun Rebellion"
 great_cajun_rebellion.1.d:0 "As the ink dries on the treaty, the streets of Nouvelle-Orléans erupt in celebration. The Spanish have formally recognized the hard-won independence of the brave people of Louisiane, relinquishing all claims to Téijane; Settlers are already staking claims in the virgin land. A new era dawns, and the future of Louisiane has never shone brighter."
 great_cajun_rebellion.1.f:0 ""In many ways, we have justified Spanish fears of how deep the tendrils of the British Empire have burrowed. Today we won our freedom, but tomorrow it could be Cuba, and the next Peru. I see joy all around me, yet I can't shake this dread of making a deal with the devil, especially when his price remains unpaid." - Jacques Villeré II"
 great_cajun_rebellion.1.a:0 "I've got an envie for some boudin!"
 great_cajun_rebellion.1.b:0 "Laissez les bons temps rouler!"